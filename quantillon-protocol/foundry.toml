[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
cache_path = "cache"

# Solidity version
solc_version = "0.8.24"
evm_version = "shanghai"

# Optimization
optimizer = true
optimizer_runs = 0  # Minimize runtime bytecode size on large contracts
via_ir = true  # IR pipeline materially reduces runtime bytecode for current oversized contracts
bytecode_hash = "none"
cbor_metadata = false

# Gas settings
gas_price = 0
gas_limit = 100000000
block_gas_limit = 100000000

# Filesystem permissions for deployment scripts (vm.createDir, vm.writeJson)
fs_permissions = [{ access = "read-write", path = "./deployments" }, { access = "read-write", path = "./" }]

# Base network configuration
[rpc_endpoints]
base = "https://mainnet.base.org"
base_sepolia = "https://sepolia.base.org"
anvil = "http://127.0.0.1:8545"

[lint]
# Exclude mixed-case-variable so build output is not flooded with style suggestions
exclude_lints = ["mixed-case-variable", "mixed-case-function", "unsafe-typecast"]

[doc]
out = "docs"
ignore = ["lib/**", "test/**", "scripts/**", "node_modules/**"]

[etherscan]
base = { key = "${ETHERSCAN_API_KEY}", url = "https://api.basescan.org/api" }
base_sepolia = { key = "${ETHERSCAN_API_KEY}", url = "https://api-sepolia.basescan.org/api" }

# Testing configuration
[profile.default.fuzz]
runs = 1000

[profile.default.invariant]
runs = 256
depth = 15
fail_on_revert = false

# Production profile for deployment
[profile.production]
optimizer = true
optimizer_runs = 0  # Minimize runtime bytecode size to satisfy EIP-170 on large contracts
via_ir = true
bytecode_hash = "none"
cbor_metadata = false

# Bytecode size optimization profile
[profile.size_optimized]
optimizer = true
optimizer_runs = 0  # Optimize for deployment size
via_ir = true

# Additional size optimizations
[profile.size_optimized.fuzz]
runs = 1000

[profile.size_optimized.invariant]
runs = 256
depth = 15
fail_on_revert = false

# Testing profile
[profile.test]
optimizer = true
optimizer_runs = 200
via_ir = true

# Coverage profile with optimized settings
[profile.coverage]
optimizer = true
optimizer_runs = 200
via_ir = true

# Documentation profile - must match default to reuse build cache
[profile.docs]
optimizer = true
optimizer_runs = 0
via_ir = true
bytecode_hash = "none"
cbor_metadata = false
